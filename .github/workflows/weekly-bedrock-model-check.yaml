name: Weekly Bedrock Model Check

on:
  schedule:
    - cron: '0 7 * * 1' # Every Monday at 07:00 UTC
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Override AMAZEEAI_API_URL for this run (e.g. https://api.amazee.ai)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  check-bedrock-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.x'

      - name: Compare deployed Bedrock models against upstream catalog
        id: compare
        env:
          # Repository variable; set AMAZEEAI_API_URL in repo Settings → Variables.
          # Falls back to the prod URL.
          AMAZEEAI_API_URL: ${{ github.event.inputs.api_url || vars.AMAZEEAI_API_URL || 'https://api.amazee.ai' }}
          # Optional system-admin Bearer token. When configured the report
          # additionally covers private/dedicated regions.
          AMAZEEAI_ADMIN_TOKEN: ${{ secrets.AMAZEEAI_ADMIN_TOKEN }}
        run: python scripts/check_missing_bedrock_models.py

      - name: Notify Slack about new missing models
        if: steps.compare.outputs.has_new_missing == 'true'
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ vars.SLACK_CHANNEL_ID }}",
              "text": ":robot_face: New Amazon Bedrock models are available upstream but not yet deployed to amazee.ai.",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":robot_face: *New Amazon Bedrock models detected*\nThe following models exist upstream but are not yet deployed to one of the amazee.ai LiteLLM regions."
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ steps.compare.outputs.summary_json }}
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.workflow }}>"
                    }
                  ]
                }
              ]
            }

      - name: Commit refreshed Bedrock state
        if: steps.compare.outputs.state_changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add scripts/bedrock-missing-models-state.json
          if git diff --cached --quiet; then
            echo "No state diff to commit."
            exit 0
          fi
          git commit -m "chore: update bedrock missing models state"

          branch="${{ github.ref_name }}"
          for attempt in 1 2 3; do
            git fetch origin "$branch"
            git rebase "origin/$branch"
            if git push origin HEAD:"$branch"; then
              exit 0
            fi
            git rebase --abort || true
            sleep 5
          done

          echo "Failed to push updated Bedrock state after 3 attempts" >&2
          exit 1
