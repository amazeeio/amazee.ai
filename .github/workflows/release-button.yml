name: "Trigger Release PR"
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Open PR from Dev to Main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Pulls unique commits in dev not yet in main
          LOG=$(git log origin/main..origin/dev --oneline --no-merges)
          DATE=$(date +'%Y-%m-%d')

          gh pr create \
            --base main \
            --head dev \
            --title "Release ($DATE)" \
            --body "### Changes in this release:
            $LOG"
