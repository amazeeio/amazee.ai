name: "Trigger Release PR"
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Open PR from Dev to Main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Pulls unique commits in dev not yet in main
          LOG=$(git log origin/main..origin/dev --oneline --no-merges)
          DATE=$(date +'%Y-%m-%d')

          gh pr create \
            --base main \
            --head dev \
            --title "Release ($DATE)" \
            --body "### Changes in this release:
            $LOG"
